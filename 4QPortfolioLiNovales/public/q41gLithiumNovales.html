<body>
    <div class="form-container">

    <form id="dForm" method="get">
        
        </br>
            <label><strong>Title:</strong>
                <input type="numeric" name="studentid" id="studentid" required onblur="checkBlur(this)"/>

                <input type="text" name="fullname" id="fullname" required onblur="checkBlur(this)"/>

                <br>
                <div class="starating" role="radiogroup" aria-label="Star Rating">
                <span class="star" data-value="5" role="radio" aria-label="5stars">★</span>

         <button type="submit">Add Movie</button>
            <script>
                function submit(){
                alert("Click");
                }

    </form>

<script>
    document.getElementById('dForm').addEventListener('submit', function(event) {
        event.preventDefault();
        if (!confirm('Are you sure you want to submit?')) {
            event.preventDefault();
        }
        let signups = JSON.parse(localStorage.getItem('signups')) || [];
        const formData = new FormData(event.target);
        const signup = {};
        for (let [key, value] of formData.entries()) {
            signup[key] = value;
        }
        signups.push(signup);
        localStorage.setItem('signups', JSON.stringify(signups));
        alert("Form submitted successfully!");
    });
    function checkBlur(input) {
        if (input.value.trim() === '') {
            input.classList.remove('valid');
            input.classList.add('invalid');
        }
        else {
            input.classList.remove('invalid');
            input.classList.add('valid');
        }
    }

</script>
</body>
