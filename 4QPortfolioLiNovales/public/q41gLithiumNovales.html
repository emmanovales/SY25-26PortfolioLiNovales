    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('rating');

    stars.forEach(star => {
    star.addEventListener('click', function() {
        const value = this.getAttribute('data-value');
        stars.forEach(s => s.classList.remove('selected'));
        stars.forEach(s => {
            if (s.getAttribute('data-value') >= value) {
                s.classList.add('selected');
            }
        });
        ratingInput.value = value;
    });

    star.addEventListener('mouseenter', function() {
        const value = this.getAttribute('data-value');
        stars.forEach(s => {
            if (s.getAttribute('data-value') >= value) {
                s.style.color = 'gold';
            }
        });
    });

    star.addEventListener('mouseleave', function() {
        stars.forEach(s => {
            if (s.classList.contains('selected')) {
                s.style.color = 'gold';
            } 
            else {
                s.style.color = 'lightgrey';
            }
        });
    });
});

function displayMovies() {
    const movieListDiv = document.getElementById('movie-list');
    const movies = JSON.parse(localStorage.getItem('movies')) || [];
    
    if (movies.length === 0) {
        movieListDiv.innerHTML = '<p>No movies added yet.</p>';
        return;
    }
    
    let html = '';
    movies.forEach(movie => {
        const rating = parseInt(movie.rating) || 0;
        let starsDisplay = '';
        
        for (let i = 1; i <= 5; i++) {
            if (i <= rating) {
                starsDisplay += '★';
            } 
            else {
                starsDisplay += '☆';
            }
        }
        
        html += `<div class="movie-item">
                ${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${starsDisplay}
                </div>`;
    });
    movieListDiv.innerHTML = html;
}
function deleteMovie(index){
    if (confirm('Are you sure you want to delete?')){
        let movies = JSON.parse(localStorage.getItem('movies')) || [];
        movies.splice(index, 1);
        localStorage.setItem('movies', JSON.stringify(movies));
        displayMovies();
        alert('Movie deleted successfully!');
    }
}

function editMovie(index) {
    let movies = JSON.parse(localStorage.getItem('movies')) || [];
    const movie = movies[index];
    document.getElementById('title').value = movie.title;
    document.getElementById('year').value = movie.year;
    document.getElementById('genre').value = movie.genre
    const rating = parseInt(movie.rating) || 0;
    stars.forEach(s => s.classList.remove('selected'));
    stars.forEach(s => {
        if (s.getAttribute('data-value') >= rating) {
            s.classList.add('selected');
        }
    });
    ratingInput.value = rating;
    const submitBtn = document.querySelector('button[type="submit"]');
    submitBtn.textContent = 'Update Movie';
    isUpdateMode = index;
}

document.getElementById('dForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    if (!confirm('Are you sure you want to submit?')) {
        return;
    }
    
    if (!ratingInput.value) {
        alert('Please select a rating!');
        return;
    }
    
    let movies = JSON.parse(localStorage.getItem('movies')) || [];
    const movie = {
        title: document.getElementById('title').value,
        year: document.getElementById('year').value,
        genre: document.getElementById('genre').value,
        rating: ratingInput.value
    };
    if (isUpdateMode !== false) {
        const existingMovie = movies[isUpdateMode];
        const oldRating = parseInt(existingMovie.rating) || 0;
        const newRating = parseInt(rating) || 0;
        const averageRating = Math.round((oldRating + newRating) / 2);
        movies[isUpdateMode] = {
            title: title,
            year: year,
            genre: genre,
            rating: averageRating.toString()
        };
        
        alert(`Movie updated! New average rating: ${averageRating} stars`);
        isUpdateMode = false;
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.textContent = 'Add Movie';
    } 
    else {const existingIndex = movies.findIndex(m => 
            m.title.toLowerCase() === title.toLowerCase()
        );
        
        if (existingIndex !== -1) {
            const existingMovie = movies[existingIndex];
            const oldRating = parseInt(existingMovie.rating) || 0;
            const newRating = parseInt(rating) || 0;
            const averageRating = Math.round((oldRating + newRating) / 2);
            movies[existingIndex] = {
                title: title,
                year: year,
                genre: genre,
                rating: averageRating.toString()
            };
            
            alert(`Movie title already exists! Updated with new information. Average rating: ${averageRating} stars`);
        } 
        else {
            const movie = {
                title: title,
                year: year,
                genre: genre,
                rating: rating
            };
            movies.push(movie);
            alert("New movie added successfully!");
        }
    }
    localStorage.setItem('movies', JSON.stringify(movies));
    
    this.reset();
    stars.forEach(s => s.classList.remove('selected'));
    ratingInput.value = '';
    
    document.querySelectorAll('input, select').forEach(field => {
        field.classList.remove('valid', 'invalid');
    });
    
    displayMovies();
});

function checkBlur(input) {
    if (input.value.trim() === '') {
        input.classList.remove('valid');
        input.classList.add('invalid');
    } 
    else {
        input.classList.remove('invalid');
        input.classList.add('valid');
    }
}
