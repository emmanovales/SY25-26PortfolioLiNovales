    <div class="form-container">
    <h1 class="title">Add a Movie</h1>
    <form id="dForm" method="get">
        
        </br>
            <label><strong>Title:</strong>
                <input type="text" name="title" id="title" required onblur="checkBlur(this)"/>
            </label></br>
            <label><strong>Year:</strong>
                <input type="number" name="year" id="year" required onblur="checkBlur(this)"/>

            <label><strong>Genre:</strong>
                <select name="genre" id="genre" required onblur="checkBlur(this)">
                    <option value="Comedy">Comedy</option>
                    <option value="Romance">Romance</option>
                    <option value="Action">Action</option>
                    <option value="Horror">Horror</option>
                    <option value="Sci-fi">Sci-fi</option>
                    <option value="Thriller">Thriller</option>
                </select>
            </label></br>
            <label><strong>Rating:</strong>
                <br>
                <div class="star-rating" role="radiogroup" aria-label="Star Rating">
                <span class="star" data-value="5" role="radio" aria-label="5stars">★</span>
                <span class="star" data-value="4" role="radio" aria-label="4stars">★</span>
                <span class="star" data-value="3" role="radio" aria-label="3stars">★</span>
                <span class="star" data-value="2" role="radio" aria-label="2stars">★</span>
                <span class="star" data-value="1" role="radio" aria-label="1star">★</span>
                </div>
                <input type="hidden" name="rating" id="rating" value="">       </label><br><br>
         <button type="submit">Add Movie</button>

    const stars = document.querySelectorAll('.star');
    const ratingInput = document.getElementById('rating');
    stars.forEach(star => {
        star.addEventListener('click', function() {
            const value = this.getAttribute('data-value');
            stars.forEach(s => s.classList.remove('selected'));
            stars.forEach(s => {
                if (s.getAttribute('data-value') >= value){
                    s.classList.add('selected');
        }
    });

    ratingInput.value = value;
    });
    stars.addEventListener('mouseenter', function(){
        const value = this.getAttribute('data-value');
        stars.forEach(s => {
        if (s.getAttribute('data-value') >= value){
            s.style.color = 'gold';
        }
    });
});
    star.addEventListener('mouseleave', function() {
        stars.forEach(s => {
            if (s.classList.contains('selected')){
                s.style.color = 'gold';
            }
            else{
                s.style.color = 'lightgray';
            }
        })
    })
});

function displayMovies() {
        const movieListDiv = document.getElementById('movie-list');
        const movies = JSON.parse(localStorage.getItem('movies')) || [];
        
        if (movies.length === 0) {
            movieListDiv.innerHTML = '<p>No movies added yet.</p>';
            return;
        }
    let html = '';
    movies.forEach(movie => {
        const rating = parseInt(movie.rating) || 0;
        let starsDisplay = '';
        for (let i = 1; i <= 5; i++){
            if (i <= rating){
                starsDisplay += '★';
            }
            else{
                starsDisplay += '☆';
            }
        }
        html += `<div class="movie-item">
                ${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${starsDisplay}
                </div>`;
    });
    movieListDiv.innerHTML = html;
}
document.getElementById('dForm').addEventListener('submit', function(event) {
        event.preventDefault();
        if (!confirm('Are you sure you want to submit?')) {
            return;
        }
        if (!ratingInput.value) {
            alert('Please select a rating!');
            return;
        }
let movies = JSON.parse(localStorage.getItem('movies')) || [];
const movie = {
            title: document.getElementById('title').value,
            year: document.getElementById('year').value,
            genre: document.getElementById('genre').value,
            rating: ratingInput.value
        };
        movies.push(movie);
        localStorage.setItem('movies', JSON.stringify(movies));
        
        alert("Movie submitted successfully!");
        this.reset();
        stars.forEach(s => s.classList.remove('selected'));
        ratingInput.value = '';
        document.querySelectorAll('input, select').forEach(field => {
            field.classList.remove('valid', 'invalid');
        });
        displayMovies();
    });
    function checkBlur(input) {
        if (input.value.trim() === '') {
            input.classList.remove('valid');
            input.classList.add('invalid');
        } 
        else {
            input.classList.remove('invalid');
            input.classList.add('valid');
        }
    }
    displayMovies();
